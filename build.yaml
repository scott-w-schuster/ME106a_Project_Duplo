# ---------------------------------------------------------------------------
# Duplo build specification
#
# position:    [row, col] — stud grid coordinates on the baseplate (0-indexed)
# shape:       [rows, cols] — e.g. [2, 4] for a 2x4 brick
# orientation: degrees of the brick's long axis relative to the baseplate x-axis
#              use 0 (along columns) or 90 (along rows)
# layer:       0 = directly on baseplate, 1 = on top of layer 0, etc.
# ---------------------------------------------------------------------------

bricks:

  # --- Layer 0 ---
  - color:       red
    shape:       [2, 4]
    position:    [0, 0]
    orientation: 0
    layer:       0

  - color:       blue
    shape:       [2, 4]
    position:    [0, 4]
    orientation: 0
    layer:       0

  - color:       yellow
    shape:       [2, 4]
    position:    [2, 0]
    orientation: 0
    layer:       0

  - color:       green
    shape:       [2, 4]
    position:    [2, 4]
    orientation: 0
    layer:       0

  # --- Layer 1 ---
  - color:       blue
    shape:       [2, 4]
    position:    [0, 2]
    orientation: 0
    layer:       1

  - color:       red
    shape:       [2, 4]
    position:    [2, 2]
    orientation: 0
    layer:       1
