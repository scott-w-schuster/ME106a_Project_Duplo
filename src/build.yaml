# ---------------------------------------------------------------------------
# Duplo build specification
#
# position:    [row, col] — stud grid coordinates on the baseplate (0-indexed)
# shape:       [rows, cols] — e.g. [2, 4] for a 2x4 brick (brick's local frame)
# orientation: degrees of the brick's long axis relative to the baseplate x-axis
#              use 0 (long axis along columns) or 90 (long axis along rows)
# layer:       0 = directly on baseplate, 1 = on top of layer 0, etc.
# height_type: half   —  9.6 mm (Duplo flat/plate)
#              normal — 19.2 mm (standard Duplo brick)   [default]
#              tall   — 38.4 mm (2× standard)
#
# Gripper: 1×2 stud footprint — TCP is commanded to the centroid of the brick's
#          placed footprint; the jaw slots self-centre on the nearest stud pair.
#          Brick detection should publish the centroid pose of each brick.
#
# Available colours (confirmed from physical inventory):
#   yellow, orange, red, light_green, sky_blue, mint, white, purple
#   (brown round piece excluded — not a standard Duplo brick)
#
# Baseplate: 16x16 studs with each corner stud missing (octagonal edges).
#   Valid positions:
#     Rows  1-14 : all columns 0-15  (16 studs wide)
#     Row   0    : columns 1-14      (14 studs wide)
#     Row  15    : columns 1-14      (14 studs wide)
#   Invalid (missing corner studs): (0,0)  (0,15)  (15,0)  (15,15)
# ---------------------------------------------------------------------------

baseplate:
  rows: 16
  cols: 16
  missing_corners:
    - [0,  0]
    - [0,  15]
    - [15, 0]
    - [15, 15]

bricks:

  # --- Layer 0 (normal height) ---
  # Four 2x4 bricks forming an 8x4 base centred on the plate (rows 6-9, cols 4-11)
  - color:       red
    shape:       [2, 4]
    position:    [6, 4]
    orientation: 0
    layer:       0
    height_type: normal

  - color:       sky_blue
    shape:       [2, 4]
    position:    [6, 8]
    orientation: 0
    layer:       0
    height_type: normal

  - color:       yellow
    shape:       [2, 4]
    position:    [8, 4]
    orientation: 0
    layer:       0
    height_type: normal

  - color:       light_green
    shape:       [2, 4]
    position:    [8, 8]
    orientation: 0
    layer:       0
    height_type: normal

  # --- Layer 1 (normal height) ---
  # Two 2x4 bricks offset by 2 columns to interlock with layer 0
  - color:       orange
    shape:       [2, 4]
    position:    [6, 6]
    orientation: 0
    layer:       1
    height_type: normal

  - color:       white
    shape:       [2, 4]
    position:    [8, 6]
    orientation: 0
    layer:       1
    height_type: normal
